<svg width="1600" height="1120" viewBox="0 0 1600 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1120" fill="#f5f6f8"/>
  <style>
    .title{font:700 24px Arial,sans-serif;fill:#111827}
    .sub{font:400 15px Arial,sans-serif;fill:#64748b}
    .label{font:700 15px Arial,sans-serif;fill:#111827}
    .small{font:400 12px Arial,sans-serif;fill:#64748b}
    .tiny{font:700 10px Arial,sans-serif;fill:#94a3b8;letter-spacing:1.6px}
    .option{font:700 18px Arial,sans-serif;fill:#111827}
    .note{font:400 13px Arial,sans-serif;fill:#475569}
    .card{fill:#ffffff;stroke:#d8dde6}
    .soft{fill:#f8fafc;stroke:#d8dde6}
    .scanner{fill:#020617;stroke:#d8dde6}
    .focus{fill:none;stroke:#22d3ee;stroke-width:2}
    .btn{fill:#ffffff;stroke:#d8dde6}
  </style>

  <text x="64" y="54" class="title">Driver Room Layout Options</text>
  <text x="64" y="80" class="sub">ตัวอย่างปรับเฉพาะขนาด/ตำแหน่งกล่องสแกน ไม่เปลี่ยนโทนสีเดิม</text>

  <!-- Option A -->
  <g transform="translate(64 120)">
    <rect width="700" height="420" rx="12" class="card"/>
    <text x="20" y="34" class="option">A. Compact Scanner</text>
    <text x="20" y="58" class="note">ลดกล่องสแกนให้พอดีจอ เห็นข้อมูลด้านบนครบ</text>
    <rect x="20" y="82" width="660" height="42" rx="7" class="soft"/>
    <rect x="36" y="96" width="120" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="540" y="94" width="118" height="18" rx="5" class="btn"/>
    <rect x="20" y="140" width="660" height="76" rx="8" class="soft"/>
    <line x1="350" y1="140" x2="350" y2="216" stroke="#d8dde6"/>
    <text x="38" y="166" class="label">ต้นทาง</text>
    <text x="38" y="190" class="small">ยังไม่เช็คอิน</text>
    <text x="368" y="166" class="label">ปลายทางปัจจุบัน</text>
    <text x="368" y="190" class="small">ยังไม่เช็คอินปลายทาง</text>
    <rect x="96" y="238" width="508" height="150" rx="10" class="scanner"/>
    <rect x="230" y="278" width="240" height="74" rx="6" class="focus"/>
    <circle cx="350" cy="332" r="14" stroke="#e2e8f0" stroke-width="3"/>
    <text x="278" y="371" class="small" fill="#cbd5e1">เปิดกล้องเพื่อสแกน</text>
  </g>

  <!-- Option B -->
  <g transform="translate(836 120)">
    <rect width="700" height="420" rx="12" class="card"/>
    <text x="20" y="34" class="option">B. Two Column Dashboard</text>
    <text x="20" y="58" class="note">ซ้ายเป็นข้อมูลงาน ขวาเป็นกล่องสแกน</text>
    <rect x="20" y="82" width="250" height="306" rx="8" class="soft"/>
    <text x="38" y="112" class="label">งานปัจจุบัน</text>
    <rect x="38" y="132" width="190" height="16" rx="3" fill="#e2e8f0"/>
    <rect x="38" y="168" width="196" height="52" rx="6" class="card"/>
    <text x="54" y="190" class="small">ต้นทาง</text>
    <text x="54" y="207" class="small">ยังไม่เช็คอิน</text>
    <rect x="38" y="232" width="196" height="52" rx="6" class="card"/>
    <text x="54" y="254" class="small">ปลายทาง</text>
    <text x="54" y="271" class="small">ยังไม่เช็คอิน</text>
    <rect x="38" y="306" width="196" height="34" rx="6" class="btn"/>
    <text x="92" y="328" class="small">เช็คอิน</text>
    <rect x="292" y="82" width="388" height="306" rx="10" class="scanner"/>
    <rect x="366" y="170" width="240" height="132" rx="6" class="focus"/>
    <circle cx="486" cy="279" r="14" stroke="#e2e8f0" stroke-width="3"/>
    <text x="416" y="326" class="small" fill="#cbd5e1">เปิดกล้องเพื่อสแกน</text>
  </g>

  <!-- Option C -->
  <g transform="translate(64 610)">
    <rect width="700" height="420" rx="12" class="card"/>
    <text x="20" y="34" class="option">C. Scanner First</text>
    <text x="20" y="58" class="note">ย่อข้อมูลเป็นแถบเดียว แล้วให้สแกนเด่นที่สุด</text>
    <rect x="20" y="82" width="660" height="50" rx="8" class="soft"/>
    <text x="38" y="112" class="label">Job</text>
    <text x="118" y="112" class="small">โหมดขึ้นรถ</text>
    <text x="270" y="112" class="small">ต้นทาง: ยังไม่เช็คอิน</text>
    <rect x="536" y="96" width="112" height="22" rx="5" class="btn"/>
    <text x="565" y="111" class="small">เช็คอิน</text>
    <rect x="54" y="154" width="592" height="232" rx="10" class="scanner"/>
    <rect x="214" y="214" width="272" height="114" rx="6" class="focus"/>
    <circle cx="350" cy="305" r="14" stroke="#e2e8f0" stroke-width="3"/>
    <text x="278" y="352" class="small" fill="#cbd5e1">เปิดกล้องเพื่อสแกน</text>
  </g>

  <!-- Option D -->
  <g transform="translate(836 610)">
    <rect width="700" height="420" rx="12" class="card"/>
    <text x="20" y="34" class="option">D. Tablet 4:3 Scanner</text>
    <text x="20" y="58" class="note">กล่อง 4:3 เหมาะกับแท็บเล็ต/มือถือ ไม่สูงเกิน</text>
    <rect x="20" y="82" width="660" height="46" rx="8" class="soft"/>
    <rect x="38" y="98" width="140" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="520" y="95" width="120" height="20" rx="5" class="btn"/>
    <rect x="166" y="150" width="368" height="276" rx="10" class="scanner"/>
    <rect x="230" y="212" width="240" height="148" rx="6" class="focus"/>
    <circle cx="350" cy="334" r="14" stroke="#e2e8f0" stroke-width="3"/>
    <text x="278" y="382" class="small" fill="#cbd5e1">เปิดกล้องเพื่อสแกน</text>
  </g>

  <text x="64" y="1080" class="sub">แนะนำ: C ถ้าต้องการให้สแกนเป็นงานหลัก / B ถ้าต้องการเห็นสถานะงานพร้อมสแกน / A ถ้าต้องการลดกล่องเฉย ๆ</text>
</svg>
